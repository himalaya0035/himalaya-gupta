<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Himalaya Gupta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #00ff9d, #58a6ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    h1 { font-size: 24px; font-weight: 700; margin: 16px 0 8px; }
    p { color: #6e7681; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: #00ff9d;
      color: #000;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 255, 157, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. It might have been moved or you may have mistyped the URL.</p>
    <a href="/">Back to Desktop</a>
  </div>
</body>
</html>
