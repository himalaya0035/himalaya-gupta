<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Himalaya Gupta — Desktop OS</title>
  <meta name="description" content="Himalaya Gupta — Senior Full-Stack Engineer" />

  <!-- Favicon: simple > in a box -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230d1117'/%3E%3Ctext x='4' y='24' font-family='monospace' font-size='22' fill='%2300ff9d'%3E%3E_%3C/text%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gui.css" />
  <link rel="stylesheet" href="css/desktop.css" />

  <!-- Apply saved theme before first paint -->
  <script>
    (function() {
      var themes = {
        green:  { bg:"#0d1117",bg2:"#161b22",fg:"#e6edf3",dim:"#6e7681",acc:"#00ff9d",blu:"#58a6ff",border:"#30363d",ok:"#3fb950",err:"#f85149" },
        amber:  { bg:"#100c00",bg2:"#1a1400",fg:"#ffe4a0",dim:"#7a6a3a",acc:"#ffd700",blu:"#ff8c00",border:"#3a2e00",ok:"#ffa500",err:"#ff4040" },
        purple: { bg:"#0e0e1a",bg2:"#161626",fg:"#e2e0ff",dim:"#6c6a8a",acc:"#bd93f9",blu:"#ff79c6",border:"#2a2a40",ok:"#50fa7b",err:"#ff5555" }
      };
      var saved = localStorage.getItem("theme") || "green";
      var t = themes[saved] || themes.green;
      var r = document.documentElement.style;
      for (var k in t) r.setProperty("--" + k, t[k]);
    })();
  </script>
</head>
<body class="desktop-mode">
  <canvas id="bg-canvas"></canvas>

  <!-- Top Menu Bar -->
  <div id="top-menu-bar">
    <div class="topbar-left">
      <span class="apple-logo"></span>
      <span id="topbar-app-name">Terminal</span>
      <span>File</span>
      <span>Edit</span>
      <span>View</span>
      <span>Window</span>
      <span>Help</span>
    </div>
    <div class="topbar-right">
      <span>100%</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
      <span id="topbar-time"></span>
    </div>
  </div>

  <!-- Desktop Wallpaper -->
  <div id="desktop-wallpaper">
    <div class="shooting-star-layer">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="wallpaper-text">HIMALAYA</div>
  </div>

  <!-- Desktop Folders Layout -->
  <div id="desktop-grid">
    <div class="desktop-folder" data-target="projects">
      <svg class="folder-svg" viewBox="0 0 100 100">
        <path d="M10,25 L35,25 L45,35 L90,35 C95.5,35 100,39.5 100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,35 C0,29.5 4.5,25 10,25 Z" fill="#60a5fa" />
        <path d="M0,45 L100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,45 Z" fill="#3b82f6" />
      </svg>
      <span>Projects</span>
    </div>
    <div class="desktop-folder" data-target="experience">
      <svg class="folder-svg" viewBox="0 0 100 100">
        <path d="M10,25 L35,25 L45,35 L90,35 C95.5,35 100,39.5 100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,35 C0,29.5 4.5,25 10,25 Z" fill="#60a5fa" />
        <path d="M0,45 L100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,45 Z" fill="#3b82f6" />
      </svg>
      <span>Experience</span>
    </div>
    <div class="desktop-folder" data-target="skills">
      <svg class="folder-svg" viewBox="0 0 100 100">
        <path d="M10,25 L35,25 L45,35 L90,35 C95.5,35 100,39.5 100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,35 C0,29.5 4.5,25 10,25 Z" fill="#60a5fa" />
        <path d="M0,45 L100,45 L100,90 C100,95.5 95.5,100 90,100 L10,100 C4.5,100 0,95.5 0,90 L0,45 Z" fill="#3b82f6" />
      </svg>
      <span>Skills</span>
    </div>
  </div>

  <!-- Terminal Window -->
  <div id="terminal-window" class="os-window hidden" data-app-title="Terminal">
    <div class="os-title-bar">
      <div class="traffic-lights">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
      </div>
      <span class="os-title-text">guest@terminal.himalayagupta.com:~</span>
    </div>
    
    <div id="terminal" class="os-content">
      <div id="output"></div>

      <!-- inline prompt — lives inside the terminal flow -->
      <div id="prompt-row" class="hidden">
        <span class="prompt-label">
          <span class="user">guest</span><span class="at">@</span><span class="host">terminal.himalayagupta.com</span><span class="sep">:~$</span>
        </span>

        <div id="prompt-visible">
          <span id="cmd-display"></span><span id="cursor"></span><span id="ghost-hint"></span><span id="tab-badge" class="hidden">TAB</span>
        </div>

        <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="terminal input" />
      </div>

      <!-- Quick Actions Bar — docked at the bottom of the window -->
      <div id="quick-actions" class="hidden">
        <span class="quick-actions-label">Quick Commands:</span>
        <button class="action-chip" data-cmd="whoami">whoami</button>
        <button class="action-chip" data-cmd="experience">experience</button>
        <button class="action-chip" data-cmd="projects">projects</button>
        <button class="action-chip" data-cmd="skills">skills</button>
        <button class="action-chip" data-cmd="resume">resume</button>
        <button class="action-chip" data-cmd="linkedin">linkedin</button>
        <button class="action-chip" data-cmd="github">github</button>
        <button class="action-chip" data-cmd="contact">contact</button>
      </div>
    </div>
  </div>

  <!-- Portfolio Window -->
  <div id="portfolio-window" class="os-window hidden" data-app-title="Safari">
    <div class="os-title-bar">
      <div class="traffic-lights">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
      </div>
      <span class="os-title-text">Himalaya Gupta — Safari</span>
    </div>
    <div class="os-content" style="background-color: #09090b;">
      <nav class="navbar" style="position: sticky;">
        <div class="nav-container">
          <div class="logo">HG.</div>
          <div class="nav-links">
            <a href="#about">About</a>
            <a href="#experience">Experience</a>
            <a href="#projects">Projects</a>
          </div>
        </div>
      </nav>
      <div id="gui-root">
         <!-- Pulled from gui-app.js -->
      </div>
    </div>
  </div>

  <!-- Dock -->
  <div id="mac-dock">
    <div class="dock-item active" data-target="terminal-window" data-title="Terminal">
      <div class="dock-icon icon-terminal">>_</div>
      <div class="dock-dot"></div>
    </div>
    <div class="dock-item" data-target="portfolio-window" data-title="Portfolio">
      <div class="dock-icon icon-safari">
        <svg viewBox="0 0 100 100">
          <defs>
            <linearGradient id="discGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#48d1ff;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#007aff;stop-opacity:1" />
            </linearGradient>
            <filter id="needleShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
              <feOffset dx="0" dy="1" result="offsetblur" />
              <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
              </feComponentTransfer>
              <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Outer Dial -->
          <circle cx="50" cy="50" r="40" fill="url(#discGrad)" />
          <!-- Ticks -->
          <g stroke="#ffffff" stroke-width="0.7" opacity="0.6">
            <line x1="50" y1="14" x2="50" y2="17" transform="rotate(0 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(30 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(60 50 50)" />
            <line x1="50" y1="14" x2="50" y2="17" transform="rotate(90 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(120 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(150 50 50)" />
            <line x1="50" y1="14" x2="50" y2="17" transform="rotate(180 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(210 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(240 50 50)" />
            <line x1="50" y1="14" x2="50" y2="17" transform="rotate(270 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(300 50 50)" />
            <line x1="50" y1="14" x2="50" y2="16" transform="rotate(330 50 50)" />
          </g>
          <!-- Needle -->
          <g filter="url(#needleShadow)" transform="rotate(45 50 50)">
            <polygon points="50,18 60,50 50,50 40,50" fill="#ff3b30" />
            <polygon points="50,82 60,50 50,50 40,50" fill="#f2f2f7" />
            <polygon points="50,18 50,50 40,50" fill="#cc3300" />
            <polygon points="50,82 50,50 40,50" fill="#d1d1d6" />
          </g>
        </svg>
      </div>
      <div class="dock-dot"></div>
    </div>
  </div>

  <!-- load order: content → commands → terminal → boot -->
  <script src="js/content.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/boot.js"></script>
  <script src="js/gui-app.js"></script>
  <script src="js/desktop.js"></script>
  <script src="js/background.js"></script>
</body>
</html>
